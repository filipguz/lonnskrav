server.port=${PORT:8080}
spring.application.name=lonnskrav

# PostgreSQL – bruker DATABASE_URL (postgres://... format fra Render) via DataSourceConfig
# Fallback til individuelle PG*-variabler hvis DATABASE_URL ikke er satt
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:lonnskrav}
spring.datasource.username=${PGUSER:sa}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true

app.ai.enabled=true
app.ai.api-key=${APP_AI_API_KEY:DIN_API_NOKKEL_HER}
app.ai.model=claude-haiku-4-5-20251001

# Auth – sett APP_AUTH_JWKS_URI i miljø for å aktivere JWT-krav
app.auth.jwks-uri=${APP_AUTH_JWKS_URI:}

# CORS – kommaseparert liste med tillatte origins
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://lonnskrav.no,https://www.lonnskrav.no}
