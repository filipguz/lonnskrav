server.port=${PORT:8080}
spring.application.name=lonnskrav
spring.datasource.url=jdbc:h2:file:./data/lonnskravdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true

spring.flyway.enabled=false

app.ai.enabled=true
app.ai.api-key=DIN_API_NOKKEL_HER
app.ai.model=gpt-4o-mini

# Auth – sett APP_AUTH_JWKS_URI i miljø for å aktivere JWT-krav
# Finn under Clerk Dashboard → API Keys → Advanced → JWKS URL
app.auth.jwks-uri=${APP_AUTH_JWKS_URI:}

# CORS – kommaseparert liste med tillatte origins
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}