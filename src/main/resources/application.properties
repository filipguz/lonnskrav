server.port=${PORT:8080}
spring.application.name=lonnskrav

# PostgreSQL – Render setter PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automatisk
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true

app.ai.enabled=true
app.ai.api-key=${APP_AI_API_KEY:DIN_API_NOKKEL_HER}
app.ai.model=gpt-4o-mini

# Auth – sett APP_AUTH_JWKS_URI i miljø for å aktivere JWT-krav
app.auth.jwks-uri=${APP_AUTH_JWKS_URI:}

# CORS – kommaseparert liste med tillatte origins
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://lonnskrav.no,https://www.lonnskrav.no}
